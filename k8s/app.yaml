apiVersion: apps/v1
kind: Deployment
metadata:
  name: split-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: split-tracker
  template:
    metadata:
      labels:
        app: split-tracker
    spec:
      containers:
        - name: split-tracker
          image: split-tracker-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/split_tracker
            - name: HOSTNAME
              value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: split-tracker
spec:
  selector:
    app: split-tracker
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP