apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: split-tracker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: split-tracker.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: split-tracker
                port:
                  number: 80